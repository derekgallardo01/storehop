# Use a barebones Application instead of StorehopApplication for unit tests.
# Our unit tests construct repositories directly (no Hilt graph), and
# StorehopApplication triggers FirebaseAuth.getInstance() via the bootstrapper,
# which blows up because Firebase isn't initialized in the JVM test runtime.
application=android.app.Application

# Pin the Robolectric runtime to API 35. The app targets SDK 36 (v0.9.1), but
# Robolectric 4.16 has no API 36 (Android 16) framework yet — it would default
# to the app's targetSdk and fail every test at class setup. Unit tests are
# JVM-logic tests and don't exercise target-SDK runtime behavior, so emulating
# API 35 is equivalent. Bump this to 36 once a stable Robolectric ships it.
sdk=35
