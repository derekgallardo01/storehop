name: iOS CI

# Validates the Swift port. Triggered on pushes that touch ios/ and on PRs
# to main. Uses GitHub-provided macOS runners (free tier — 2000 min/month
# for public repos, ~200 effective min/month for private since macOS time
# counts 10x).
#
# What this catches:
#   - All compile errors
#   - SWIFT_STRICT_CONCURRENCY: complete warnings/errors (per project.yml)
#   - Every unit test in StorehopTests/
#   - xcstrings parse failures, malformed Asset Catalog JSON
#
# What this DOES NOT catch:
#   - Firebase runtime behavior (no live project; tests use mocks)
#   - UI tests beyond launch (need GoogleService-Info.plist past
#     FirebaseApp.configure())
#   - Cross-platform sync verification — that's a manual TestFlight pass

on:
  push:
    branches: ['**']
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  workflow_dispatch: {}

jobs:
  build-and-test:
    # macos-15 ships Xcode 16+, which is required because xcodegen emits
    # project format 77 (a "future format" rejected by Xcode 15.4 on
    # macos-14). Pinning to macos-15 also matches the project's iOS 17+
    # deployment target, which Xcode 16 fully supports.
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version
          sw_vers

      - name: Write CI-only placeholder GoogleService-Info.plist
        # The real GoogleService-Info.plist is gitignored (the file pulls
        # in a per-environment Firebase project config). For CI we just
        # need ANY valid plist so `FirebaseApp.configure()` in
        # StorehopApp.init() doesn't crash when the test session launches
        # the host app to set up the test bundle.
        #
        # All values are obvious placeholders; nothing in CI talks to
        # real Firebase services. If a test ever DID try to round-trip
        # through Firebase Auth / Firestore here, it would fail loudly
        # against the dummy project id rather than silently against a
        # real one.
        run: |
          cat > Storehop/Resources/GoogleService-Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>BUNDLE_ID</key><string>com.storehop.app</string>
            <key>API_KEY</key><string>ci-placeholder-api-key</string>
            <key>GOOGLE_APP_ID</key><string>1:000000000000:ios:0000000000000000000000</string>
            <key>GCM_SENDER_ID</key><string>000000000000</string>
            <key>PROJECT_ID</key><string>storehop-ci-placeholder</string>
            <key>STORAGE_BUCKET</key><string>storehop-ci-placeholder.appspot.com</string>
            <key>CLIENT_ID</key><string>000000000000-placeholder.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key><string>com.googleusercontent.apps.000000000000-placeholder</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><true/>
            <key>IS_GCM_ENABLED</key><true/>
            <key>IS_SIGNIN_ENABLED</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SwiftPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Storehop.xcodeproj \
            -scheme Storehop

      - name: Build (simulator, no code signing)
        run: |
          xcodebuild build \
            -project Storehop.xcodeproj \
            -scheme Storehop \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath build/build.xcresult

      - name: Test (unit tests only)
        # -only-testing alone isn't enough on Xcode 16.4: the scheme still
        # builds + launches the UITest runner host (StorehopUITests-Runner),
        # which calls `FirebaseApp.configure()` and crashes because the CI
        # simulator has no `GoogleService-Info.plist` (it's gitignored).
        # `-skip-testing:StorehopUITests` prevents the runner from launching
        # at all, so the StorehopTests bundle (pure unit tests, no Firebase
        # init) runs cleanly.
        #
        # FirebaseAuthSessionProviderTests is also skipped: although it uses
        # `MockFirebaseAuthClient` to drive the provider, Firebase Auth's
        # internal listener (started by the host app's `FirebaseApp.configure`)
        # blocks on `SecItemCopyMatching` against the CI simulator's keychain,
        # which lacks the keychain-sharing entitlement the framework needs
        # ("required entitlement isn't present"). The test then hangs forever
        # waiting for an auth state event that never fires. The provider is
        # well-covered locally where the keychain entitlement is granted; CI
        # validates the rest of the unit suite.
        run: |
          xcodebuild test \
            -project Storehop.xcodeproj \
            -scheme Storehop \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath build/test.xcresult \
            -only-testing:StorehopTests \
            -skip-testing:StorehopUITests \
            -skip-testing:StorehopTests/FirebaseAuthSessionProviderTests \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload xcresult bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-${{ github.run_id }}
          path: ios/build/*.xcresult
          retention-days: 7
          if-no-files-found: ignore
