name: Android CI

# Validates the Android port. Triggered on pushes touching app/, gradle
# build files, or this workflow itself, plus PRs into main. Runs on the
# free GitHub-hosted ubuntu-latest runner — Android JVM unit tests don't
# need an emulator, and the Paparazzi screenshot suite uses the headless
# LayoutLib renderer so it's also pure JVM.
#
# What this catches:
#   - All compile errors (Kotlin + KSP + Hilt + Room codegen).
#   - 443+ JVM unit tests across DAOs, repos, ViewModels, sync, CSV.
#   - Android lint warnings (release variant; configured to warn but not
#     fail by default — adjust if we want hard gates).
#
# What this DOES NOT catch:
#   - Anything that requires an emulator: instrumented Compose UI tests,
#     real Firebase round-trips, macrobenchmark cold-start numbers. Those
#     stay manual / hardware-only.
#   - Pitest mutation testing (slow; opt-in locally).
#   - Paparazzi screenshot tests: attempted but Paparazzi 1.3.5's test
#     listener relies on a Gradle internal API removed in Gradle 9.x,
#     which breaks the whole testDebugUnitTest task as soon as the plugin
#     is applied. Defer until Paparazzi publishes a Gradle-9-compatible
#     release or we evaluate Roborazzi.

on:
  push:
    branches: ['**']
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Show toolchain versions
        run: |
          java -version
          ./gradlew --version

      - name: Unit tests + lint
        run: |
          ./gradlew \
            :app:testDebugUnitTest \
            :app:lintDebug \
            --console=plain

      - name: Upload unit-test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report-${{ github.run_id }}
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.run_id }}
          path: app/build/reports/lint-results-debug.*
          retention-days: 7
          if-no-files-found: ignore
