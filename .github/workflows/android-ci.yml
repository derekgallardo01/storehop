name: Android CI

# Validates the Android port. Triggered on pushes touching app/, gradle
# build files, or this workflow itself, plus PRs into main. Runs on the
# free GitHub-hosted ubuntu-latest runner — Android JVM unit tests don't
# need an emulator, and the Paparazzi screenshot suite uses the headless
# LayoutLib renderer so it's also pure JVM.
#
# What this catches:
#   - All compile errors (Kotlin + KSP + Hilt + Room codegen).
#   - 443+ JVM unit tests across DAOs, repos, ViewModels, sync, CSV.
#   - Android lint warnings (release variant; configured to warn but not
#     fail by default — adjust if we want hard gates).
#
# What this DOES NOT catch:
#   - Anything that requires an emulator: instrumented Compose UI tests,
#     real Firebase round-trips, macrobenchmark cold-start numbers. Those
#     stay manual / hardware-only.
#   - Pitest mutation testing (slow; opt-in locally).
#   - Paparazzi screenshot tests: attempted but Paparazzi 1.3.5's test
#     listener relies on a Gradle internal API removed in Gradle 9.x,
#     which breaks the whole testDebugUnitTest task as soon as the plugin
#     is applied. Defer until Paparazzi publishes a Gradle-9-compatible
#     release or we evaluate Roborazzi.

on:
  push:
    branches: ['**']
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Write CI-only placeholder google-services.json
        # The real google-services.json is gitignored (it carries the live
        # Firebase project's API keys + OAuth client ids). The google-
        # services Gradle plugin fails the build outright when the file
        # is missing, even though the JVM unit tests we run here never
        # actually hit Firebase. Write a minimal placeholder with a valid
        # shape; nothing in CI talks to real Firebase services.
        run: |
          cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "storehop-ci-placeholder",
              "storage_bucket": "storehop-ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.storehop.app"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  { "current_key": "ci-placeholder-api-key" }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Show toolchain versions
        run: |
          java -version
          ./gradlew --version

      - name: Unit tests + lint
        run: |
          ./gradlew \
            :app:testDebugUnitTest \
            :app:lintDebug \
            --console=plain

      - name: Upload unit-test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report-${{ github.run_id }}
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.run_id }}
          path: app/build/reports/lint-results-debug.*
          retention-days: 7
          if-no-files-found: ignore
